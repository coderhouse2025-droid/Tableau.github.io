<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="3;url=https://public.tableau.com/app/profile/juan.manuel.orellana" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juan Manuel Orellana · Tableau Public</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1a6b3c;
      --green-light: #e8f5ee;
      --green-mid: #2d9e5f;
      --text: #1a1a1a;
      --muted: #6b7280;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--green-light);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-circle {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(45,158,95,0.15), transparent 70%);
      pointer-events: none;
    }
    .bg-circle-1 { width: 600px; height: 600px; top: -200px; right: -200px; }
    .bg-circle-2 { width: 400px; height: 400px; bottom: -150px; left: -150px; }

    .card {
      background: white;
      border-radius: 24px;
      padding: 56px 64px;
      text-align: center;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 8px 40px rgba(26,107,60,0.12), 0 2px 8px rgba(0,0,0,0.06);
      animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) both;
      position: relative;
      z-index: 1;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      background: var(--green);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(26,107,60,0.3); }
      50%       { box-shadow: 0 0 0 14px rgba(26,107,60,0); }
    }

    .icon-wrap svg { width: 38px; height: 38px; fill: white; }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.9rem;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 36px;
    }

    .progress-bar {
      background: var(--green-light);
      border-radius: 100px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 28px;
    }

    .progress-fill {
      height: 100%;
      background: var(--green);
      border-radius: 100px;
      animation: fill 3s linear forwards;
    }

    @keyframes fill {
      from { width: 0%; }
      to   { width: 100%; }
    }

    .counter {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .counter span {
      font-weight: 600;
      color: var(--green);
      font-size: 1rem;
    }

    .btn {
      display: inline-block;
      background: var(--green);
      color: white;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 100px;
      font-size: 0.95rem;
      font-weight: 500;
      transition: background 0.2s, transform 0.2s;
    }

    .btn:hover {
      background: var(--green-mid);
      transform: translateY(-2px);
    }

    .tag {
      display: inline-block;
      background: var(--green-light);
      color: var(--green);
      font-size: 0.75rem;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>

  <div class="card">
    <div class="icon-wrap">
      <!-- Tableau-like bar chart icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="12" width="4" height="10" rx="1"/>
        <rect x="8" y="6" width="4" height="16" rx="1"/>
        <rect x="14" y="9" width="4" height="13" rx="1"/>
        <rect x="20" y="3" width="4" height="19" rx="1" transform="translate(-4 0)"/>
      </svg>
    </div>

    <div class="tag">// Tableau Public</div>
    <h1>Juan Manuel Orellana</h1>
    <p class="subtitle">Redirigiendo a tu perfil de visualizaciones&hellip;</p>

    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>

    <p class="counter">Redirigiendo en <span id="countdown">3</span> segundos</p>

    <a class="btn" href="https://public.tableau.com/app/profile/juan.manuel.orellana">
      Ir ahora →
    </a>
  </div>

  <script>
    let t = 3;
    const el = document.getElementById('countdown');
    const timer = setInterval(() => {
      t--;
      el.textContent = t;
      if (t <= 0) {
        clearInterval(timer);
        window.location.href = 'https://public.tableau.com/app/profile/juan.manuel.orellana';
      }
    }, 1000);
  </script>
</body>
</html>
